<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shared Drive Permission Audit</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fff; --fg: #1f2328; --muted: #57606a; --border: #d0d7de;
    --ok: #1a7f37; --warn: #bf8700; --err: #cf222e;
    --pill-ok: #dafbe1; --pill-warn: #fff8c5; --pill-err: #ffebe9; --pill-unk: #eaeef2;
    --hl: #ddf4ff;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0d1117; --fg: #c9d1d9; --muted: #8b949e; --border: #30363d;
      --ok: #3fb950; --warn: #d29922; --err: #f85149;
      --pill-ok: #033a16; --pill-warn: #3a2700; --pill-err: #3a0d12; --pill-unk: #21262d; --hl: #051a37; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg); background: var(--bg); padding: 16px; }
  h1 { font-size: 15px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { display: flex; flex-direction: column; min-width: 110px; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat.warn .value { color: var(--warn); }
  .stat.err .value { color: var(--err); }
  section { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-top: 10px; }
  section h2 { font-size: 12px; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  ul { padding: 0; margin: 0; }
  li { list-style: none; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: baseline; font-size: 12px; }
  li:last-child { border-bottom: none; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; text-transform: uppercase; }
  .pill.warn { background: var(--pill-warn); color: var(--warn); }
  .pill.err { background: var(--pill-err); color: var(--err); }
  .pill.ok { background: var(--pill-ok); color: var(--ok); }
  .pill.hl { background: var(--hl); color: var(--fg); }
  a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chips > span { background: var(--hl); border-radius: 8px; padding: 2px 8px; font-size: 11px; }
</style>
</head>
<body>
<div id="app">Loading…</div>
<script>
(function(){
  function escape(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

  function render(d) {
    if (!d) return '<p class="empty">No data.</p>';
    const drive = d.drive || {};
    const s = d.summary || {};
    const cls = d.classCounts || {};
    const roles = d.roleCounts || {};
    const findings = d.findings || {};
    const caveats = Array.isArray(d.caveats) ? d.caveats : [];

    const anyoneClass = (s.anyoneWithLinkFiles || 0) > 0 ? 'err' : '';
    const extClass = (s.externalFiles || 0) > 5 ? 'warn' : '';
    const highClass = (s.highShareFiles || 0) > 0 ? 'warn' : '';

    const linkOrName = (f) => f.webViewLink ? `<a href="${escape(f.webViewLink)}" target="_blank">${escape(f.name)}</a>` : escape(f.name);

    const anyoneList = (findings.anyoneWithLink || []).map(f => `<li>
      <span style="flex:1">${linkOrName(f)}</span>
      <span class="pill err">anyone</span>
    </li>`).join('') || '<li class="empty">None.</li>';

    const externalList = (findings.externallyShared || []).map(f => `<li>
      <span style="flex:1">${linkOrName(f)}</span>
      <span class="mono">${escape(f.externalEmails.length)} ext</span>
    </li>`).join('') || '<li class="empty">None.</li>';

    const highList = (findings.highShare || []).map(f => `<li>
      <span style="flex:1">${linkOrName(f)}</span>
      <span class="pill warn">${escape(f.permissionCount)} grants</span>
    </li>`).join('') || '<li class="empty">None.</li>';

    const classChips = Object.entries(cls).filter(([,v]) => v > 0)
      .map(([k,v]) => `<span>${escape(k)} · ${v}</span>`).join('') || '<span class="empty">—</span>';
    const roleChips = Object.entries(roles)
      .map(([k,v]) => `<span>${escape(k)} · ${v}</span>`).join('') || '<span class="empty">—</span>';

    const cavBlock = caveats.length === 0 ? '' :
      `<section><h2>Caveats</h2><ul>${caveats.map(c => `<li>${escape(c)}</li>`).join('')}</ul></section>`;

    return `
      <h1>${escape(drive.name || 'Shared Drive')}</h1>
      <div class="meta mono">${escape(drive.id || '')}${s.internalDomain ? ' · internal: ' + escape(s.internalDomain) : ''}</div>
      <div class="row">
        <div class="stat ${anyoneClass}">
          <span class="label">Anyone-with-link</span>
          <span class="value">${s.anyoneWithLinkFiles || 0}</span>
        </div>
        <div class="stat ${extClass}">
          <span class="label">External files</span>
          <span class="value">${s.externalFiles || 0}</span>
        </div>
        <div class="stat ${highClass}">
          <span class="label">High-share</span>
          <span class="value">${s.highShareFiles || 0}</span>
        </div>
        <div class="stat">
          <span class="label">Files audited</span>
          <span class="value">${s.filesAudited || 0}</span>
        </div>
        <div class="stat">
          <span class="label">Unique grantees</span>
          <span class="value">${s.uniqueGrantees || 0}</span>
        </div>
      </div>
      <section>
        <h2>Permission classes</h2>
        <div class="chips">${classChips}</div>
      </section>
      <section>
        <h2>Roles</h2>
        <div class="chips">${roleChips}</div>
      </section>
      <section><h2>Anyone-with-link (${(findings.anyoneWithLink||[]).length})</h2><ul>${anyoneList}</ul></section>
      <section><h2>Externally shared (${(findings.externallyShared||[]).length})</h2><ul>${externalList}</ul></section>
      <section><h2>High-share files (${(findings.highShare||[]).length})</h2><ul>${highList}</ul></section>
      ${cavBlock}
    `;
  }
  function update(){ document.getElementById('app').innerHTML = render(window.openai && window.openai.toolOutput); }
  update();
  window.addEventListener('openai:set_globals', update);
})();
</script>
</body>
</html>
